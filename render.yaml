services:
  - type: web
    name: llm-inference-bench-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: llm-bench-db
          property: connectionString
      - key: ALLOWED_ORIGIN
        sync: false          # set this manually in the Render dashboard to your Vercel URL
      - key: RESULTS_DIR
        value: /tmp/results  # ephemeral — fine for estimates; real benchmark runs won't persist across restarts

databases:
  - name: llm-bench-db
    plan: free
    databaseName: llm_bench
